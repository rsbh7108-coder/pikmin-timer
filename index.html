<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>皮克敏菇菇重生計時器</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; overflow-x: hidden; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", Arial, sans-serif;
      background: #f3f7ef;
      color: #253323;
      padding: 12px;
    }
    .app { width: 100%; max-width: 760px; margin: 0 auto; overflow-x: hidden; }
    h1 { margin: 6px 0 4px; font-size: 25px; color: #2f7d32; text-align: center; line-height: 1.25; }
    .subtitle { text-align: center; color: #66745f; margin-bottom: 10px; font-size: 13px; line-height: 1.45; }

    .scene-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 4px 0 10px;
      overflow-x: auto;
      padding: 4px 2px 6px;
      scrollbar-width: none;
    }
    .scene-bar::-webkit-scrollbar { display: none; }
    .scene-tab-wrap {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      background: #ffffff;
      border: 1px solid #d8e8cf;
      border-radius: 999px;
      box-shadow: 0 2px 8px rgba(51, 93, 39, 0.08);
      flex: 0 0 auto;
      overflow: hidden;
    }
    .scene-tab-wrap.active {
      background: #4caf50;
      border-color: #4caf50;
    }
    .scene-tab {
      border: 0;
      background: transparent;
      color: #4f6548;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 900;
      box-shadow: none;
      flex: 0 0 auto;
    }
    .scene-tab.active {
      color: #fff;
    }
    .scene-tab-danger,
    .scene-tab-delete,
    .scene-tab-edit {
      border: 0;
      background: rgba(255,255,255,0.7);
      width: 24px;
      height: 24px;
      padding: 0;
      border-radius: 50%;
      font-size: 13px;
      font-weight: 900;
      line-height: 1;
    }
    .scene-tab-edit { color: #5f6b59; }
    .scene-tab-delete { color: #b04545; margin-right: 3px; }
    .scene-tab-danger { color: #ffffff; background: #e53935; width: auto; padding: 0 8px; border-radius: 999px; }
    .scene-tab-delete:hover, .scene-tab-danger:hover { background: #c62828; }
    .scene-tab-edit:hover { background: #eef6e9; }
    .scene-action {
      background: #f0f3ee;
      color: #5f6b59;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      flex: 0 0 auto;
    }
    .scene-action.delete { color: #b04545; }
    .scene-action:disabled { opacity: 0.45; cursor: not-allowed; }

    .tool-row { display: flex; justify-content: flex-end; gap: 6px; margin: 0 0 10px; align-items: center; }
    .tool-row button { background: #f0f3ee; color: #5f6b59; font-size: 12px; padding: 6px 9px; border-radius: 999px; }
    .tool-row button:hover, .scene-action:hover { background: #e1eadc; }

    .panel {
      background: #fff;
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 5px 14px rgba(51, 93, 39, 0.11);
      border: 1px solid #dfead8;
      overflow: hidden;
    }
    .location-input-row { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 8px; align-items: center; }
    .location-buttons { display: contents; }
    input {
      width: 100%; min-width: 0;
      padding: 9px 10px;
      font-size: 15px;
      border: 1px solid #cddcc6;
      border-radius: 11px;
      outline: none;
      background: #fbfdf9;
    }
    input:focus { border-color: #58a64b; box-shadow: 0 0 0 3px rgba(88, 166, 75, 0.14); }
    button {
      border: 0;
      border-radius: 11px;
      padding: 9px 12px;
      font-size: 14px;
      cursor: pointer;
      background: #4caf50;
      color: #fff;
      font-weight: 700;
      white-space: nowrap;
    }
    button:hover { background: #3f9443; }
    .secondary { background: #7b61ff; }
    .secondary:hover { background: #684ee0; }
    .hint { font-size: 12px; color: #7b8874; margin-top: 8px; line-height: 1.45; }

    .location-list { display: flex; flex-direction: column; gap: 12px; width: 100%; overflow-x: hidden; }
    .group-block { display: flex; flex-direction: column; gap: 9px; }
    .group-title { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 900; color: #4f6548; padding: 0 4px; margin-top: 2px; }
    .group-dot { width: 10px; height: 10px; border-radius: 50%; background: #4caf50; flex: 0 0 auto; }
    .group-dot.precise-off { background: #7b61ff; }
    .group-count { color: #8a9584; font-size: 12px; font-weight: 800; }

    .swipe-item { position: relative; width: 100%; overflow: hidden; border-radius: 15px; }
    .swipe-delete { position: absolute; right: 0; top: 0; bottom: 0; width: 78px; border-radius: 0 15px 15px 0; background: #e53935; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 900; z-index: 0; }
    .location-card { background: #fff; border-radius: 15px; border: 1px solid #dfead8; box-shadow: 0 4px 12px rgba(51, 93, 39, 0.09); padding: 10px 10px 10px 14px; position: relative; overflow: hidden; z-index: 1; transition: transform 0.18s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease; touch-action: pan-y; }
    @keyframes oneMinutePulse { 0% { box-shadow: 0 0 0 rgba(255, 152, 0, 0); } 50% { box-shadow: 0 0 18px rgba(255, 152, 0, 0.65); } 100% { box-shadow: 0 0 0 rgba(255, 152, 0, 0); } }
    .location-card.warning-soon { background: #fff3e0; border-color: #ff9800; animation: oneMinutePulse 1.2s infinite; }
    .location-card.warning-soon:before { background: #ff9800; }
    .location-card:before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 7px; background: #4caf50; }
    .location-card.precise-off:before { background: #7b61ff; }
    .swipe-item.open .location-card { transform: translateX(-78px); }

    .card-grid { display: grid; grid-template-columns: minmax(0, 1.05fr) minmax(0, 1.1fr) auto; gap: 10px; align-items: center; width: 100%; min-width: 0; }
    .main-block, .timer-block, .delete-block { min-width: 0; }
    .title-row, .meta-row, .input-row, .status-row, .respawn-row { display: flex; align-items: center; min-width: 0; }
    .title-row { gap: 6px; }
    .meta-row { gap: 7px; margin-top: 5px; color: #66745f; font-size: 13px; }
    .location-name { font-weight: 900; font-size: 17px; color: #263d24; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
    .edit-icon-btn { background: #f0f3ee; color: #5f6b59; width: 24px; height: 24px; padding: 0; border-radius: 50%; font-size: 12px; flex: 0 0 auto; }
    .edit-icon-btn:hover { background: #e1eadc; }
    .direction-display { font-size: 18px; font-weight: 900; color: #ff8a00; min-width: 18px; text-align: center; line-height: 1; }
    .direction-display.empty { color: #a8b1a2; font-size: 13px; font-weight: 800; }
    .people-display { font-weight: 900; color: #416a39; white-space: nowrap; }
    .people-display.empty { color: #a8b1a2; font-weight: 800; }
    .countdown-inline { margin-left: auto; color: #2f7d32; font-size: 16px; font-weight: 950; white-space: nowrap; text-align: right; }
    .countdown-inline.done { color: #e65100; }
    .countdown-inline.waiting { color: #8a9584; font-size: 14px; }
    .input-row { gap: 6px; }
    .input-row input { flex: 1 1 auto; }
    .start-btn { flex: 0 0 auto; }
    .status-row { margin-top: 4px; font-size: 13px; color: #5e6a59; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .respawn-row { justify-content: flex-end; color: #d6427a; font-weight: 900; font-size: 15px; white-space: nowrap; text-align: right; }
    .desktop-delete { background: #eee; color: #666; padding: 8px 10px; font-size: 13px; border-radius: 10px; }
    .desktop-delete:hover { background: #ddd; }
    .inline-edit-row { display: grid; grid-template-columns: 1fr auto auto; gap: 6px; margin-bottom: 6px; }
    .save-btn { background: #4caf50; }
    .cancel-btn { background: #eee; color: #666; }
    .direction-popover, .people-popover { margin-top: 7px; padding: 8px; background: #fbfdf9; border: 1px solid #dfead8; border-radius: 13px; box-shadow: 0 4px 12px rgba(51, 93, 39, 0.08); }
    .direction-popover { width: 132px; }
    .people-popover { width: 170px; }
    .people-edit-row { display: grid; grid-template-columns: 1fr auto auto; gap: 6px; }
    .direction-row { width: 114px; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 4px; margin-bottom: 6px; }
    .direction-btn { background: #edf4e8; color: #4f6548; width: 34px; height: 30px; padding: 0; font-size: 14px; border: 1px solid #d5e5cc; border-radius: 9px; }
    .direction-btn:hover { background: #dfeeda; }
    .direction-btn.active { background: #ff9800; color: #fff; border-color: #ff9800; }

    @media (max-width: 640px) {
      body { padding: 10px; }
      h1 { font-size: 22px; }
      .subtitle { max-height: 42px; overflow: hidden; }
      .tool-row { margin-top: -4px; }
      .location-input-row { grid-template-columns: 1fr; }
      .location-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .card-grid { grid-template-columns: 1fr; gap: 6px; }
      .timer-block { display: grid; grid-template-columns: 1fr; gap: 3px; }
      .input-row { grid-template-columns: minmax(0, 1fr) auto; display: grid; }
      .start-btn { padding: 9px 10px; }
      .respawn-row { justify-content: flex-end; margin-top: -2px; }
      .desktop-delete { display: none; }
      .location-card { padding-top: 9px; padding-bottom: 9px; }
      .swipe-item { overflow: hidden; }
      .delete-block { display: none; }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>🍄 皮克敏菇菇重生計時器</h1>
    <div class="subtitle">輸入地點名稱並選擇分類；系統會計算「打完時間 + 5分鐘」並依最快重生排序</div>

    <div class="scene-bar" id="sceneBar"></div>
    <div id="sceneManageBar" style="display:flex;justify-content:flex-end;gap:6px;margin:-2px 0 10px;"></div>

    <div class="tool-row">
      <button type="button" id="exportBtn">匯出</button>
      <button type="button" id="importBtn">匯入</button>
      <button type="button" id="notifyBtn" style="display:none;">啟用提醒</button>
      <button type="button" id="clearAllBtn">清空</button>
    </div>
    <input type="file" id="importFile" accept="application/json,.json" style="display:none">

    <section class="panel">
      <div class="location-input-row">
        <input id="newLocationName" placeholder="輸入地點，例如：公園左邊、超商旁">
        <div class="location-buttons">
          <button type="button" id="addNormalBtn">＋ 正常位置</button>
          <button type="button" id="addPreciseOffBtn" class="secondary">＋ 關精準位置</button>
        </div>
      </div>
      <div class="hint">時間可輸入 12:30、1230、200；資料會自動暫存在此瀏覽器。</div>
    </section>

    <section id="locationList" class="location-list"></section>
  </div>

  <script>
    var STORAGE_KEY = 'pikmin_mushroom_timer_v4';
    var OLD_KEYS = ['pikmin_mushroom_timer_v3', 'pikmin_mushroom_timer_v2', 'pikmin_mushroom_timer_v1'];
    var locationCounter = 1;
    var sceneCounter = 2;
    var scenes = [];
    var currentSceneId = 'scene_1';
    var intervalId = null;
    var swipeState = { startX: 0, startY: 0, item: null };
    var isAddingScene = false;
    var editingSceneId = null;
    var MAX_SCENES = 3;

    function createLocation(type, customName) {
      var name = customName || type + ' ' + locationCounter;
      locationCounter = locationCounter + 1;
      return { id: 'loc_' + new Date().getTime() + '_' + Math.floor(Math.random() * 1000000), type: type, name: name, inputTime: '', finishTime: null, respawnTime: null, direction: '', isEditingName: false, isEditingDirection: false, peopleCount: '', isEditingPeople: false, notifiedOneMinute: false };
    }
    function createScene(name, locations) {
      var id;
      sceneCounter = Math.max(sceneCounter, 2);
      id = 'scene_' + sceneCounter;
      sceneCounter = sceneCounter + 1;
      return { id: id, name: name, locations: locations || [] };
    }
    function getCurrentScene() { var i; for (i = 0; i < scenes.length; i = i + 1) if (scenes[i].id === currentSceneId) return scenes[i]; return scenes[0]; }
    function getLocations() { var scene = getCurrentScene(); return scene ? scene.locations : []; }
    function setLocations(next) { var scene = getCurrentScene(); if (scene) scene.locations = next; }
    function findLocation(id) { var list = getLocations(), i; for (i = 0; i < list.length; i = i + 1) if (list[i].id === id) return list[i]; return null; }

    function isWholeNumber(value) { return typeof value === 'number' && isFinite(value) && Math.floor(value) === value; }
    function parseTime(value) { var text = String(value || '').trim(), parts, minutes, seconds; if (!text) return null; if (text.indexOf(':') >= 0) { parts = text.split(':'); if (parts.length !== 2) return null; minutes = Number(parts[0]); seconds = Number(parts[1]); } else { if (!/^\d+$/.test(text)) return null; if (text.length <= 2) { minutes = 0; seconds = Number(text); } else { seconds = Number(text.slice(-2)); minutes = Number(text.slice(0, -2)); } } if (!isWholeNumber(minutes) || !isWholeNumber(seconds)) return null; if (minutes < 0 || seconds < 0 || seconds >= 60) return null; return minutes * 60 + seconds; }
    function pad2(value) { value = String(value); return value.length < 2 ? '0' + value : value; }
    function normalizeTimeLabel(value) { var totalSeconds = parseTime(value), minutes, seconds; if (totalSeconds === null) return ''; minutes = Math.floor(totalSeconds / 60); seconds = totalSeconds % 60; return minutes + ':' + pad2(seconds); }
    function formatClock(date) { if (!date) return '尚未設定'; return pad2(date.getHours()) + ':' + pad2(date.getMinutes()) + ':' + pad2(date.getSeconds()); }
    function formatCountdown(ms) { var totalSeconds = Math.max(0, Math.floor(ms / 1000)); var minutes = Math.floor(totalSeconds / 60); var seconds = totalSeconds % 60; return minutes + '分 ' + pad2(seconds) + '秒'; }
    function getTimerStatus(location) { if (!location.respawnTime) return 2; if (location.respawnTime.getTime() <= new Date().getTime()) return 1; return 0; }
    function getSortValue(location) { if (!location.respawnTime) return 9007199254740991; return Math.max(0, location.respawnTime.getTime() - new Date().getTime()); }
    function sortLocationList(list) { list.sort(function(a, b) { var statusA = getTimerStatus(a), statusB = getTimerStatus(b); if (statusA !== statusB) return statusA - statusB; if (statusA === 0) return getSortValue(a) - getSortValue(b); return a.name.localeCompare(b.name, 'zh-Hant'); }); return list; }

    function safeStorageAvailable() { try { window.localStorage.setItem('__storage_test__', '1'); window.localStorage.removeItem('__storage_test__'); return true; } catch (e) { return false; } }
    function serializeLocationList(list) { var data = [], i; for (i = 0; i < list.length; i = i + 1) data.push({ id: list[i].id, type: list[i].type, name: list[i].name, inputTime: list[i].inputTime, finishTime: list[i].finishTime ? list[i].finishTime.getTime() : null, respawnTime: list[i].respawnTime ? list[i].respawnTime.getTime() : null, direction: list[i].direction || '', peopleCount: list[i].peopleCount || '', notifiedOneMinute: list[i].notifiedOneMinute ? true : false }); return data; }
    function hydrateLocations(rawLocations) { var result = [], i, item; if (!rawLocations || !rawLocations.length) return result; for (i = 0; i < rawLocations.length; i = i + 1) { item = rawLocations[i]; result.push({ id: item.id || ('loc_' + new Date().getTime() + '_' + i), type: item.type === '關精準位置' ? '關精準位置' : '正常位置', name: item.name || '未命名地點', inputTime: item.inputTime || '', finishTime: item.finishTime ? new Date(item.finishTime) : null, respawnTime: item.respawnTime ? new Date(item.respawnTime) : null, direction: item.direction || '', isEditingName: false, isEditingDirection: false, peopleCount: item.peopleCount || '', isEditingPeople: false, notifiedOneMinute: item.notifiedOneMinute ? true : false }); } return result; }
    function serializeState() { var exportScenes = [], i; for (i = 0; i < scenes.length; i = i + 1) exportScenes.push({ id: scenes[i].id, name: scenes[i].name, locations: serializeLocationList(scenes[i].locations) }); return { version: 4, exportedAt: new Date().toISOString(), locationCounter: locationCounter, sceneCounter: sceneCounter, currentSceneId: currentSceneId, scenes: exportScenes }; }
    function hydrateState(data) {
      var i;
      var newId;
      if (data && data.scenes && data.scenes.length) {
        scenes = [];
        for (i = 0; i < data.scenes.length && i < MAX_SCENES; i = i + 1) {
          newId = i === 0 ? 'scene_1' : (data.scenes[i].id || ('scene_' + (i + 1)));
          scenes.push({
            id: newId,
            name: data.scenes[i].name || (i === 0 ? '預設場景' : ('場景' + (i + 1))),
            locations: hydrateLocations(data.scenes[i].locations || [])
          });
        }
        if (!scenes.length) return false;
        scenes[0].id = 'scene_1';
        if (!data.currentSceneId || data.currentSceneId === scenes[0].id || !sceneExists(data.currentSceneId)) {
          currentSceneId = scenes[0].id;
        } else {
          currentSceneId = data.currentSceneId;
        }
        if (!sceneExists(currentSceneId)) currentSceneId = scenes[0].id;
        locationCounter = data.locationCounter || 1;
        sceneCounter = Math.max(data.sceneCounter || 2, scenes.length + 1);
        saveState();
        return true;
      }
      if (data && data.locations) {
        scenes = [{ id: 'scene_1', name: '預設場景', locations: hydrateLocations(data.locations) }];
        currentSceneId = 'scene_1';
        locationCounter = data.locationCounter || scenes[0].locations.length + 1;
        sceneCounter = 2;
        saveState();
        return true;
      }
      return false;
    }

    function sceneExists(id) {
      var i;
      for (i = 0; i < scenes.length; i = i + 1) {
        if (scenes[i].id === id) return true;
      }
      return false;
    }

    function saveState() { if (!safeStorageAvailable()) return; try { window.localStorage.setItem(STORAGE_KEY, JSON.stringify(serializeState())); } catch (e) { console.warn('無法儲存暫存資料', e); } }
    function loadState() { var text, data, i; if (!safeStorageAvailable()) return false; try { text = window.localStorage.getItem(STORAGE_KEY); if (!text) { for (i = 0; i < OLD_KEYS.length; i = i + 1) { text = window.localStorage.getItem(OLD_KEYS[i]); if (text) break; } } if (!text) return false; data = JSON.parse(text); return hydrateState(data); } catch (e) { console.warn('無法讀取暫存資料', e); return false; } }

    function beginAddScene() {
      if (scenes.length >= MAX_SCENES) {
        alert('場景最多只能新增 3 個');
        return;
      }
      editingSceneId = null;
      isAddingScene = true;
      renderSceneTabs();
      setTimeout(function() {
        var input = document.getElementById('newSceneName');
        if (input) input.focus();
      }, 0);
    }

    function cancelAddScene() {
      isAddingScene = false;
      renderSceneTabs();
    }

    function beginEditScene(sceneId) {
      editingSceneId = sceneId;
      isAddingScene = false;
      renderSceneTabs();
      setTimeout(function() {
        var input = document.getElementById('editSceneName');
        if (input) input.focus();
      }, 0);
    }

    function cancelEditScene() {
      editingSceneId = null;
      renderSceneTabs();
    }

    function confirmEditScene(sceneId) {
      var input = document.getElementById('editSceneName');
      var name = input ? String(input.value).trim() : '';
      var i;
      if (!name) {
        alert('場景名稱不可空白');
        return;
      }
      for (i = 0; i < scenes.length; i = i + 1) {
        if (scenes[i].id === sceneId) scenes[i].name = name;
      }
      editingSceneId = null;
      saveState();
      render();
    }

    function confirmAddScene() {
      var input = document.getElementById('newSceneName');
      var name = input ? String(input.value).trim() : '';
      var scene;
      if (!name) {
        alert('場景名稱不可空白');
        return;
      }
      if (scenes.length >= MAX_SCENES) {
        alert('場景最多只能新增 3 個');
        isAddingScene = false;
        renderSceneTabs();
        return;
      }
      scene = createScene(name, []);
      scenes.push(scene);
      currentSceneId = scene.id;
      isAddingScene = false;
      editingSceneId = null;
      saveState();
      render();
    }

    function deleteSceneById(sceneId) {
      var targetScene = null;
      var message;
      var next = [];
      var i;

      if (scenes.length <= 1) {
        alert('至少需保留一個場景');
        return;
      }

      if (sceneId === 'scene_1' || (scenes[0] && scenes[0].id === sceneId)) {
        alert('預設第1個場景不可刪除。若要清空內容，請使用右上方「清空」。');
        return;
      }

      for (i = 0; i < scenes.length; i = i + 1) {
        if (scenes[i].id === sceneId) targetScene = scenes[i];
      }

      if (!targetScene) {
        alert('找不到要刪除的場景，請重新整理後再試。');
        return;
      }

      message = [
        '確定要刪除「' + targetScene.name + '」場景嗎？',
        '',
        '此場景內的所有地點與倒數資料都會刪除，而且刪除後無法回復。'
      ].join(String.fromCharCode(10));

      if (!window.confirm(message)) return;

      for (i = 0; i < scenes.length; i = i + 1) {
        if (scenes[i].id !== sceneId) next.push(scenes[i]);
      }

      scenes = next;
      if (currentSceneId === sceneId || !sceneExists(currentSceneId)) currentSceneId = scenes[0].id;
      isAddingScene = false;
      saveState();
      render();
    }

    function deleteScene() {
      deleteSceneById(currentSceneId);
    }
    function switchScene(id) { currentSceneId = id; saveState(); render(); }

    function addLocation(type) { var input = document.getElementById('newLocationName'), customName = input.value.trim(); if (!customName) { alert('請先輸入地點名稱'); return; } getLocations().push(createLocation(type, customName)); input.value = ''; saveState(); render(); }

    function init() { document.getElementById('addNormalBtn').onclick = function() { addLocation('正常位置'); }; document.getElementById('addPreciseOffBtn').onclick = function() { addLocation('關精準位置'); }; document.getElementById('exportBtn').onclick = exportData; document.getElementById('importBtn').onclick = function() { document.getElementById('importFile').click(); }; document.getElementById('notifyBtn').onclick = requestNotificationPermission; document.getElementById('clearAllBtn').onclick = clearAllData; var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent); if (!isMobile) document.getElementById('notifyBtn').style.display = 'inline-block'; document.getElementById('importFile').onchange = function(event) { var file = event.target.files && event.target.files[0]; if (file) importDataFromFile(file); event.target.value = ''; }; if (!loadState()) { scenes = [{ id: 'scene_1', name: '預設場景', locations: [createLocation('正常位置', 'A地點'), createLocation('關精準位置', 'B地點')] }]; currentSceneId = 'scene_1'; sceneCounter = 2; saveState(); } runTests(); render(); updateNotifyButton(); if (intervalId) clearInterval(intervalId); intervalId = setInterval(updateAllCountdowns, 1000); }
